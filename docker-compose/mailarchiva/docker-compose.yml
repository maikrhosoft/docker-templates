services:

  mailarchiva:
    build: .
    container_name: ${MAILARCHIVA_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      - postgres
      - opensearch
    ports:
      - "${MAILARCHIVA_PORT}:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SEARCH_HOST: ${SEARCH_HOST}
      SEARCH_PORT: ${SEARCH_PORT}
    volumes:
      - /volume1/docker/mailarchiva/data:/opt/mailarchiva/data
      - /volume1/docker/mailarchiva/logs:/opt/mailarchiva/logs
    networks:
      - default
      - bridge

  postgres:
    image: postgres:15
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /volume1/docker/mailarchiva/postgres:/var/lib/postgresql/data
    networks:
      - default

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: ${OPENSEARCH_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      plugins.security.disabled: ${OPENSEARCH_SECURITY_DISABLED}
    volumes:
      - /volume1/docker/mailarchiva/opensearch:/usr/share/opensearch/data
    networks:
      - default

  dovecot:
    build:
      context: ./dovecot
    container_name: ${DOVECOT_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${DOVECOT_IMAP_PORT}:143"
      - "${DOVECOT_IMAPS_PORT}:993"
    environment:
      DOVECOT_USER: ${DOVECOT_USER}
      DOVECOT_PASSWORD: ${DOVECOT_PASSWORD}
      DOVECOT_TLS_CN: ${DOVECOT_TLS_CN}
    volumes:
      - /volume1/docker/mailarchiva/dovecot/conf:/etc/dovecot
      - /volume1/docker/mailarchiva/dovecot/mail:/var/mail/vhosts
    networks:
      - bridge

networks:
  default:
    name: ${NETWORK_DEFAULT_NAME}

  bridge:
    name: ${NETWORK_BRIDGE_NAME}
    external: true
