services:

  gitlab:
    image: gitlab/gitlab-ce:19.0.3-ce.0
    container_name: gitlab
    hostname: ${GITLAB_HOSTNAME}
    restart: unless-stopped
    shm_size: 256m
    ports:
      - "${GITLAB_SSH_HOST_PORT}:22"
      - "${GITLAB_HTTP_HOST_PORT}:80"
      - "${GITLAB_HTTPS_HOST_PORT}:443"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url "${GITLAB_EXTERNAL_URL}"
        # Absender fuer System-Mails (Notifications, Passwort-Resets etc.)
        gitlab_rails['gitlab_email_from'] = "${GITLAB_EMAIL_FROM}"
        # GitLab-Shell-SSH-Port (fuer Clone-URLs und Web-UI-Anzeige)
        # entspricht dem Host-Port, unter dem SSH erreichbar ist.
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_HOST_PORT}
        # Eigene SMTP-Einstellungen hier eintragen (Beispiel):
        # gitlab_rails['smtp_enable'] = true
        # gitlab_rails['smtp_address'] = "smtp.example.com"
        # gitlab_rails['smtp_port'] = 587
        # gitlab_rails['smtp_user_name'] = "user"
        # gitlab_rails['smtp_password'] = "pass"
        # gitlab_rails['smtp_domain'] = "example.com"
        # gitlab_rails['smtp_authentication'] = "login"
        # gitlab_rails['smtp_enable_starttls_auto'] = true
        # Backups
        gitlab_rails['manage_backup_path'] = true
        gitlab_rails['backup_path'] = "/var/opt/gitlab/backups"
        gitlab_rails['backup_archive_permissions'] = 0644
        gitlab_rails['backup_keep_time'] = 604800
    volumes:
      - ./config:/etc/gitlab
      - ./logs:/var/log/gitlab
      - ./data:/var/opt/gitlab
      - ./backups:/var/opt/gitlab/backups
    networks:
      - gitlab-bridge
      - gitlab-internal

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine-v19.0.2
    container_name: gitlab-runner
    restart: unless-stopped
    depends_on:
      - gitlab
    volumes:
      - ./runner/config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab-internal

networks:
  # Bridge-Netz mit Host-Port-Binding fuer GitLab (HTTP/HTTPS/SSH).
  # Der Synology-Reverse-Proxy spricht GitLab ueber diese Ports an.
  gitlab-bridge:
    name: ${GITLAB_BRIDGE_NETWORK_NAME}
  # Internes Bridge-Netz nur fuer GitLab <-> Runner-Kommunikation.
  # Runner hat hier keinen Host-Port, sondern erreicht GitLab ueber den
  # Compose-internen DNS-Namen "gitlab" auf Port 80.
  gitlab-internal:
